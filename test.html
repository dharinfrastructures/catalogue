<button onclick="uploadImage()">Test Upload Image</button>

<script>

const API="https://script.google.com/macros/s/AKfycbwqjnPUJY1N73bngNGB3S47fjvyhjySHIFAPXO18qJqNLcxb7BSlHXHq8LPGzFEvZ0I/exec";

// ➕ ADD ITEM TEST

// 🖼 IMAGE UPLOAD TEST
function uploadImage(){

let file=document.getElementById("img").files[0];
if(!file){ alert("select image"); return; }

let reader=new FileReader();

reader.onload=function(){
let base64=reader.result.split(",")[1];

let formData=new FormData();
formData.append("type","upload");
formData.append("file",base64);
formData.append("mime",file.type);
formData.append("filename",file.name);

fetch(API,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(url=>{
alert("Image uploaded URL:\n"+url);
});
};

reader.readAsDataURL(file);
}

</script>
