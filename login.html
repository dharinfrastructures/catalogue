<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-4">

<div class="card shadow">
<div class="card-body">

<h4 class="text-center mb-3">Admin Login</h4>

<input id="email" class="form-control mb-3" placeholder="Email">
<input id="pass" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100">Login</button>

<p id="msg" class="text-danger text-center mt-2"></p>

</div>
</div>

</div>
</div>
</div>

<script src="api.js"></script>
<script>
function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

fetch(API+"?type=login&email="+email+"&pass="+pass)
.then(res=>res.text())
.then(data=>{

if(data=="success"){

localStorage.setItem("admin","logged_"+Date.now());
window.location="dashboard.html";

}else{
document.getElementById("msg").innerText="Wrong login";
}

});
}
</script>

</body>
</html>
