<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="pattern-bg">
<div id="preloader" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">
<div class="spinner-border text-dark" style="width:3rem;height:3rem;"></div>
</div>
    <div class="container-fluid pl-0">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-6 p-0">
                <img src="./images/login-side.jpg" alt="" class="img-fluid w-100 object-fit-cover vh-100">
            </div>
            <div class="col-md-6 ">
                <div class="row justify-content-center align-items-center"><div class="col-md-7"><div class="card shadow login-card">
                    <div class="card-body ">
                        <a class="brand-elegant" href="#">
                <img src="./images/logo.png" alt="" class="img-fluid" width="50px">
                <span class="font-mb-20">Dhar Infrastructures</span>
            </a>
                        <h4 class="text-center mb-3">Admin Login</h4>

                        <input id="email" class="form-control mb-3" placeholder="Email">
                        <input id="pass" type="password" class="form-control mb-3" placeholder="Password">
                        <p id="msg" class="text-danger text-center mt-2"></p>
                        <button onclick="login()" class="btn btn-outline-elegant w-100">Login</button>

                        

                    </div>
                </div></div></div>
                

            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/script.js"></script>
    <script>
        function login() {

            let email = document.getElementById("email").value;
            let pass = document.getElementById("pass").value;

            fetch(API + "?type=login&email=" + email + "&pass=" + pass)
                .then(res => res.text())
                .then(data => {

                    if (data == "success") {

                        let session = {
                            token: "admin_" + Math.random().toString(36).substring(2),
                            time: Date.now(),
                            device: navigator.userAgent
                        };

                        localStorage.setItem("adminSession", JSON.stringify(session));

                        window.location = "dashboard.html";
                    } else {
                        document.getElementById("msg").innerText = "Wrong login";
                    }

                });
        }
    </script>

</body>

</html>
