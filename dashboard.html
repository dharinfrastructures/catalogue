<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>

let s=localStorage.getItem("adminSession");

if(!s){
window.location="login.html";
}

let session=JSON.parse(s);

// device check
if(session.device !== navigator.userAgent){
localStorage.removeItem("adminSession");
window.location="login.html";
}

// expiry 6 hours
let now=Date.now();
if(now-session.time > 21600000){
localStorage.removeItem("adminSession");
window.location="login.html";
}

</script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Admin Dashboard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Catalogue</a>
        </li>
      </ul>
      <div class="d-flex">
      <form class="d-flex" onsubmit="return false;">
  <input id="searchInput" class="form-control me-2" type="search" placeholder="Search items...">
  <button class="btn btn-outline-success" type="button" onclick="searchItems()">Search</button>
</form>

      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <button class="btn btn-danger w-100 ms-2" onclick="logout()">Logout</button>
        </li>
      </ul>
      </div>
    </div>
  </div>
</nav>
<div class="container">
    <div class="card my-5 shadow-sm">
<div class="card-body">
<h5 class="card-title mb-3">Upload New Item</h5>

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Title</label>
<input type="text" class="form-control" id="title">
</div>

<div class="col-md-4">
<label class="form-label">Select Category</label>
<select class="form-select" id="categorySelect">
</select>
</div>

<div class="col-md-4">
<label class="form-label">New Category</label>
<input type="text" class="form-control" placeholder="Flooring>Wood>Premium" id="newCategory">
</div>

<div class="col-md-5">
<label class="form-label">Upload Image</label>
<input type="file" class="form-control" onchange="preview(event)" id="imageInput">
<img id="preview" class="img-fluid rounded mt-2 border" width="200px">
</div>

<div class="col-md-3">
<label class="form-label">Price</label>
<input type="text" class="form-control" placeholder="₹ 120" id="price">
</div>

<div class="col-md-3">
  <label class="form-label">Unit</label>
  <select id="unit" class="form-select">
<option value="">Unit</option>
<option value="/sqft">/sqft</option>
<option value="/roll">/roll</option>
<option value="/piece">/piece</option>
<option value="/box">/box</option>
<option value="/meter">/meter</option>
</select>
</div>

<div class="col-md-4">
<button class="btn btn-primary w-100" onclick="uploadItem()">Upload Item</button>
<div class="progress mt-3" style="height:20px; display:none;" id="uploadProgressBox">
  <div id="uploadProgress" 
       class="progress-bar progress-bar-striped progress-bar-animated"
       role="progressbar" 
       style="width:0%">
       0%
  </div>
</div>
</div>

</div>
</div>
</div>

<h5 class="mb-3">Uploaded Items</h5>

<div class="row g-3" id="itemsContainer">



</div>

</div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="api.js"></script>
    <script src="app.js"></script>

    <script>
        function preview(e){
let reader=new FileReader();
reader.onload=function(){
document.getElementById("preview").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}
    </script>
</body>
</html>
